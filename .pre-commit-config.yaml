repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: gitleaks
        name: gitleaks secret scan
        entry: gitleaks protect --staged --redact --config=.gitleaks.toml
        language: system
        pass_filenames: false

      - id: conventional-commit
        name: conventional commit message
        entry: python scripts/validate_commit_msg.py
        language: system
        stages: [commit-msg]
